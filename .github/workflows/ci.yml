name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Workflow-level GITHUB_TOKEN scope. No job in this file pushes code,
# comments on PRs, or creates releases; all writes to external services
# use their own non-GITHUB_TOKEN secrets. contents:read is the safe floor.
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package and test dependencies
        run: pip install -e ".[dev]"
      - run: pytest tests/ -v

  marker-sync:
    uses: WXYC/wxyc-etl/.github/workflows/check-ci-marker-sync.yml@gha/v1
    with:
      repo-path: "."
      workflows-dir: ".github/workflows"
      tests-dir: "tests"
      wxyc-etl-ref: gha/v1
